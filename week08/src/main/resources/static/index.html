<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spring Boot 功能演示</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            width: 100%;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 50px;
        }

        header h1 {
            font-size: 3em;
            margin-bottom: 15px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
        }

        header p {
            font-size: 1.2em;
            opacity: 0.9;
        }

        .features-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
        }

        .feature-card {
            background: white;
            border-radius: 20px;
            padding: 40px 30px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            display: block;
        }

        .feature-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
        }

        .feature-icon {
            font-size: 4em;
            margin-bottom: 20px;
            display: block;
        }

        .feature-title {
            font-size: 1.8em;
            color: #333;
            margin-bottom: 15px;
            font-weight: 600;
        }

        .feature-description {
            color: #666;
            line-height: 1.6;
            font-size: 1em;
        }

        .feature-badge {
            display: inline-block;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 8px 20px;
            border-radius: 20px;
            margin-top: 20px;
            font-size: 0.9em;
            font-weight: 600;
        }

        footer {
            text-align: center;
            color: white;
            margin-top: 50px;
            opacity: 0.8;
        }

        @media (max-width: 600px) {
            header h1 {
                font-size: 2em;
            }

            .features-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🚀 Spring Boot 功能演示</h1>
            <p>基于 Redis 的高性能功能实现</p>
        </header>

        <div class="features-grid">
            <a href="/like.html" class="feature-card">
                <span class="feature-icon">❤️</span>
                <h2 class="feature-title">视频点赞系统</h2>
                <p class="feature-description">
                    使用 Redis Set + ZSet 实现的高性能点赞功能，支持点赞/取消点赞、实时统计、热门排行等功能
                </p>
                <span class="feature-badge">立即体验 →</span>
            </a>

            <!-- 可以继续添加其他功能卡片 -->
            <!--
            <a href="/sms.html" class="feature-card">
                <span class="feature-icon">📱</span>
                <h2 class="feature-title">短信验证码</h2>
                <p class="feature-description">
                    基于 Redis 的短信验证码功能，支持发送验证码、验证验证码等操作
                </p>
                <span class="feature-badge">即将上线</span>
            </a>
            -->
        </div>

        <footer>
            <p>© 2026 Spring Boot Demo Project</p>
        </footer>
    </div>
</body>
</html>
